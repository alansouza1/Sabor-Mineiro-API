spring:
  application:
    name: sabor-mineiro-api
  datasource:
    url: jdbc:postgresql://localhost:5432/sabormineiro
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.sabormineiro.api: DEBUG

sabormineiro:
  app:
    jwtSecret: ${JWT_SECRET:mineiroSecretKeyForCollegeProject2026WithEnoughLengthToAvoidSecurityException}
    jwtExpirationMs: 86400000
  admin:
    email: ${ADMIN_EMAIL:admin@sabormineiro.com}
    password: ${ADMIN_PASSWORD:admin123}
  demo:
    email: ${DEMO_EMAIL:demo@sabormineiro.com}
    password: ${DEMO_PASSWORD:demo123}
